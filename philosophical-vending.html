<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>철학적 질문 자판기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Special+Elite&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f0e8;
    --ink: #2a2118;
    --faded: #8a7a65;
    --rust: #9b4a2a;
    --aged: #d4c9b0;
    --shadow: rgba(42,33,24,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #e8e0d0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(42,33,24,0.04) 27px,
        rgba(42,33,24,0.04) 28px
      );
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nanum Myeongjo', serif;
    padding: 40px 20px;
  }

  .machine {
    width: 100%;
    max-width: 580px;
    position: relative;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
  }

  .header::before {
    content: '✦  ✦  ✦';
    display: block;
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--faded);
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--faded);
    margin-bottom: 8px;
  }

  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--ink);
    line-height: 1.3;
  }

  /* 영수증 카드 */
  .receipt-wrap {
    position: relative;
    margin-bottom: 32px;
  }

  .receipt {
    background: var(--paper);
    border: 1px solid var(--aged);
    padding: 0;
    box-shadow:
      4px 4px 0 var(--aged),
      8px 8px 0 rgba(42,33,24,0.08);
    position: relative;
    overflow: hidden;
    min-height: 220px;
  }

  /* 영수증 상단 톱니 */
  .receipt::before {
    content: '';
    display: block;
    height: 12px;
    background: 
      radial-gradient(circle at 8px 0, #e8e0d0 8px, var(--paper) 8px) -4px 0 / 16px 12px repeat-x;
  }

  /* 영수증 하단 톱니 */
  .receipt::after {
    content: '';
    display: block;
    height: 12px;
    background: 
      radial-gradient(circle at 8px 12px, #e8e0d0 8px, var(--paper) 8px) -4px 0 / 16px 12px repeat-x;
  }

  .receipt-inner {
    padding: 28px 40px 24px;
  }

  .receipt-meta {
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--faded);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px dashed var(--aged);
    padding-bottom: 12px;
  }

  .question-area {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 0;
  }

  .question-text {
    font-family: 'IM Fell English', serif;
    font-size: 22px;
    line-height: 1.65;
    color: var(--ink);
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .question-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .question-text em {
    font-style: italic;
    color: var(--rust);
  }

  .placeholder-text {
    font-family: 'Special Elite', cursive;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--aged);
    text-align: center;
    text-transform: uppercase;
  }

  .receipt-footer {
    font-family: 'Special Elite', cursive;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--aged);
    text-align: center;
    border-top: 1px dashed var(--aged);
    padding-top: 12px;
    margin-top: 8px;
  }

  /* 카운터 */
  .counter {
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--faded);
    text-align: center;
    margin-bottom: 24px;
  }

  .counter span {
    color: var(--rust);
  }

  /* 버튼 */
  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .main-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px 48px;
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    transition: all 0.15s ease;
    box-shadow: 4px 4px 0 var(--faded);
  }

  .main-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--faded);
  }

  .main-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--faded);
  }

  .main-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .secondary-btn {
    background: transparent;
    color: var(--faded);
    border: 1px solid var(--aged);
    padding: 10px 28px;
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .secondary-btn:hover {
    color: var(--rust);
    border-color: var(--rust);
  }

  /* 출력 효과 */
  @keyframes typewriter-roll {
    from { max-height: 0; opacity: 0; }
    to { max-height: 300px; opacity: 1; }
  }

  .rolling {
    animation: typewriter-roll 0.4s ease-out forwards;
  }

  /* 기어/장식 */
  .decoration {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 32px;
  }

  .gear {
    font-size: 18px;
    color: var(--aged);
    display: inline-block;
    transition: transform 0.8s ease;
  }

  .gear.spinning {
    animation: spin 0.8s ease-in-out;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .deco-line {
    flex: 1;
    height: 1px;
    background: var(--aged);
    max-width: 80px;
  }

  /* 히스토리 */
  .history-wrap {
    margin-top: 40px;
    display: none;
  }

  .history-wrap.show { display: block; }

  .history-title {
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--faded);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 16px;
  }

  .history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-item {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--faded);
    padding: 8px 16px;
    border-left: 2px solid var(--aged);
    line-height: 1.5;
    transition: color 0.2s;
    cursor: default;
  }

  .history-item:hover {
    color: var(--ink);
    border-color: var(--rust);
  }

  /* 로딩 */
  .loading-dots {
    display: inline-flex;
    gap: 6px;
  }

  .loading-dots span {
    width: 5px;
    height: 5px;
    background: var(--ink);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="machine">
  <div class="header">
    <div class="title">Philosophical Vending Machine</div>
    <div class="subtitle">철학적 질문 자판기</div>
  </div>

  <div class="receipt-wrap">
    <div class="receipt">
      <div class="receipt-inner">
        <div class="receipt-meta">
          <span>No. <span id="ticket-no">—</span></span>
          <span id="ticket-date">— — —</span>
        </div>

        <div class="question-area" id="question-area">
          <div class="placeholder-text">
            버튼을 누르면<br>질문이 나옵니다
          </div>
        </div>

        <div class="receipt-footer">
          답은 없습니다 — 다만 생각이 있을 뿐
        </div>
      </div>
    </div>
  </div>

  <div class="counter" id="counter" style="display:none">
    지금까지 <span id="count">0</span>개의 질문을 받았습니다
  </div>

  <div class="btn-wrap">
    <button class="main-btn" id="main-btn" onclick="dispense()">
      질문 뽑기
    </button>
    <button class="secondary-btn" id="history-btn" onclick="toggleHistory()" style="display:none">
      지난 질문들 보기
    </button>
  </div>

  <div class="decoration">
    <div class="deco-line"></div>
    <div class="gear" id="gear">⚙</div>
    <div class="deco-line"></div>
  </div>

  <div class="history-wrap" id="history-wrap">
    <div class="history-title">— 오늘의 기록 —</div>
    <ul class="history-list" id="history-list"></ul>
  </div>
</div>

<script>
  let count = 0;
  let history = [];
  let isLoading = false;

  const SYSTEM_PROMPT = `당신은 철학적 질문을 만드는 기계입니다.
매번 단 하나의 짧고 강렬한 철학적 질문을 한국어로 생성하세요.
질문은 다음 기준을 따릅니다:
- 답이 없거나 답이 여러 개인 질문
- 일상적인 언어로 쓰되 깊은 울림을 가진 것
- 15~40자 사이의 길이
- 끝에 물음표로 끝남
- 가볍지 않고 잠시 멈추게 만드는 질문
- 이전에 뽑힌 질문과 다른 주제와 각도

다양한 주제를 다루세요: 시간, 기억, 존재, 언어, 타인, 죽음, 사랑, 의식, 자유의지, 진실, 아름다움, 도덕 등.

반드시 질문 하나만 출력하고, 다른 설명이나 부가 텍스트는 절대 포함하지 마세요.`;

  async function dispense() {
    if (isLoading) return;
    isLoading = true;

    const btn = document.getElementById('main-btn');
    const area = document.getElementById('question-area');
    const gear = document.getElementById('gear');

    btn.disabled = true;
    gear.classList.add('spinning');
    setTimeout(() => gear.classList.remove('spinning'), 800);

    // 로딩 표시
    area.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;

    // 티켓 번호 / 날짜 갱신
    count++;
    document.getElementById('ticket-no').textContent = String(count).padStart(3, '0');
    const now = new Date();
    document.getElementById('ticket-date').textContent =
      `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

    const previousQuestions = history.length > 0
      ? `\n\n이미 뽑힌 질문들 (중복 금지):\n${history.map((q,i) => `${i+1}. ${q}`).join('\n')}`
      : '';

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT + previousQuestions,
          messages: [{ role: "user", content: "질문 하나 생성" }]
        })
      });

      const data = await response.json();
      const question = data.content?.[0]?.text?.trim() || "지금 이 순간, 당신은 누구입니까?";

      history.unshift(question);
      if (history.length > 10) history.pop();

      // 질문 표시
      area.innerHTML = `<div class="question-text" id="q-text">${formatQuestion(question)}</div>`;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('q-text')?.classList.add('visible');
        });
      });

      // UI 업데이트
      document.getElementById('counter').style.display = 'block';
      document.getElementById('count').textContent = count;
      document.getElementById('history-btn').style.display = 'block';
      updateHistory();

    } catch (e) {
      const fallbacks = [
        "내가 기억하지 못하는 나는 아직 나인가?",
        "지금 이 선택은 자유로운가, 아니면 이미 정해진 것인가?",
        "타인의 고통을 나는 정말 느낄 수 있는가?",
        "존재한다는 것은 증명할 수 있는 일인가?",
        "아름다움은 세상에 있는가, 아니면 보는 눈 안에 있는가?"
      ];
      const q = fallbacks[Math.floor(Math.random() * fallbacks.length)];
      history.unshift(q);
      area.innerHTML = `<div class="question-text" id="q-text">${formatQuestion(q)}</div>`;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('q-text')?.classList.add('visible');
        });
      });
      document.getElementById('counter').style.display = 'block';
      document.getElementById('count').textContent = count;
      document.getElementById('history-btn').style.display = 'block';
      updateHistory();
    }

    isLoading = false;
    btn.disabled = false;
  }

  function formatQuestion(q) {
    // 쉼표나 특정 어절 앞에서 em 처리
    return q.replace(/(아직|정말|과연|진짜|도대체)/g, '<em>$1</em>');
  }

  function updateHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = history.map(q => `<li class="history-item">${q}</li>`).join('');
  }

  function toggleHistory() {
    const wrap = document.getElementById('history-wrap');
    const btn = document.getElementById('history-btn');
    wrap.classList.toggle('show');
    btn.textContent = wrap.classList.contains('show') ? '닫기' : '지난 질문들 보기';
  }
</script>
</body>
</html>
