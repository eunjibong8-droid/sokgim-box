<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>철학적 질문 자판기 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&family=Gowun+Batang&display=swap" rel="stylesheet">
<style>
  :root {
    --salmon: #f2a99a;
    --salmon-light: #fcd5cc;
    --salmon-pale: #fef0ec;
    --sage: #7a9e7e;
    --sage-light: #c2d9c5;
    --sage-pale: #edf5ee;
    --cream: #fffaf8;
    --ink: #2c2c2c;
    --soft: #a89490;
    --yellow: #fff3b0;
    --lavender: #ede0f8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--salmon-pale);
    background-image: radial-gradient(circle, rgba(122,158,126,0.12) 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Gaegu', cursive;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* 배경 원형 */
  .bg-blob-1 {
    position: fixed; top: -100px; right: -80px;
    width: 300px; height: 300px;
    background: var(--salmon-light);
    border-radius: 50%;
    opacity: 0.5; pointer-events: none; z-index: 0;
  }
  .bg-blob-2 {
    position: fixed; bottom: -60px; left: -60px;
    width: 220px; height: 220px;
    background: var(--sage-light);
    border-radius: 50%;
    opacity: 0.4; pointer-events: none; z-index: 0;
  }

  /* 고정 잎사귀 */
  .fixed-leaf {
    position: fixed; pointer-events: none; z-index: 0;
  }
  .fixed-leaf-tr {
    top: 60px; right: -10px;
    transform: rotate(20deg);
    opacity: 0.22;
  }
  .fixed-leaf-bl {
    bottom: 80px; left: -10px;
    transform: rotate(-30deg) scaleX(-1);
    opacity: 0.18;
  }

  /* 앱 */
  .app {
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  /* 헤더 */
  .header {
    text-align: center;
  }

  .header-emoji {
    display: block;
    animation: wobble 3.5s ease-in-out infinite;
    margin-bottom: 6px;
    line-height: 1;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-4deg) scale(1); }
    50% { transform: rotate(4deg) scale(1.05); }
  }

  .header-title {
    font-family: 'Nanum Pen Script', cursive;
    font-size: 34px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .header-sub {
    font-size: 15px;
    color: var(--soft);
  }

  /* 메인 카드 */
  .main-card {
    width: 100%;
    background: var(--cream);
    border-radius: 32px;
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 26px 24px 22px;
    position: relative;
    overflow: visible;
  }

  /* 스티커들 */
  .sticker {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.12));
  }
  .sticker-a { top: -16px; right: 28px; animation-delay: 0s; }
  .sticker-b { top: -16px; left: 28px; animation-delay: 0.8s; }
  .sticker-c { bottom: -14px; right: 50px; animation-delay: 1.5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-7px) rotate(6deg); }
  }

  /* 카드 상단 배지 */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .session-tag {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--soft);
  }

  .mood-pill {
    background: var(--salmon-light);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 13px;
    color: var(--ink);
    opacity: 0;
    transition: opacity 0.4s ease;
    font-family: 'Gaegu', cursive;
  }
  .mood-pill.show { opacity: 1; }

  /* 질문 영역 */
  .question-zone {
    min-height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 4px;
    position: relative;
  }

  .placeholder {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .placeholder-icon {
    font-size: 36px;
    animation: sway 3s ease-in-out infinite;
    display: block;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-8deg); }
    50% { transform: rotate(8deg); }
  }

  .placeholder-text {
    font-size: 16px;
    color: var(--soft);
    line-height: 1.6;
  }

  .question-output {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: center;
  }

  .question-output.show {
    display: flex;
    animation: pop-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.75); }
    to { opacity: 1; transform: scale(1); }
  }

  .question-q {
    font-family: 'Gowun Batang', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.75;
  }

  /* 파형 */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 22px;
    opacity: 0;
    transition: opacity 0.5s ease 0.3s;
  }
  .waveform.show { opacity: 1; }

  .wb {
    width: 3px;
    background: var(--salmon);
    border-radius: 3px;
    animation: wv 1.4s ease-in-out infinite;
  }
  .wb:nth-child(1)  { height: 7px;  animation-delay: 0.0s; }
  .wb:nth-child(2)  { height: 13px; animation-delay: 0.1s; }
  .wb:nth-child(3)  { height: 19px; animation-delay: 0.2s; }
  .wb:nth-child(4)  { height: 11px; animation-delay: 0.3s; }
  .wb:nth-child(5)  { height: 17px; animation-delay: 0.15s; }
  .wb:nth-child(6)  { height: 21px; animation-delay: 0.05s; }
  .wb:nth-child(7)  { height: 15px; animation-delay: 0.25s; }
  .wb:nth-child(8)  { height: 9px;  animation-delay: 0.35s; }
  .wb:nth-child(9)  { height: 19px; animation-delay: 0.1s; }
  .wb:nth-child(10) { height: 13px; animation-delay: 0.2s; }
  .wb:nth-child(11) { height: 7px;  animation-delay: 0.3s; }

  @keyframes wv {
    0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* 버튼 */
  .btn-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
  }

  .count-bubble {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--salmon-light);
    border: 3px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .count-bubble.bump {
    animation: bump 0.3s ease;
  }

  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .main-btn {
    flex: 1;
    background: var(--ink);
    color: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 50px;
    padding: 13px 20px;
    font-family: 'Gaegu', cursive;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--sage);
    transition: all 0.12s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .main-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--sage);
  }

  .main-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--sage);
  }

  .main-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: 4px 4px 0 var(--sage);
  }

  .btn-icon {
    font-size: 20px;
    display: inline-block;
  }

  .main-btn.loading .btn-icon {
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 도트 카운터 */
  .dot-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    display: none;
  }
  .dot-row.show { display: flex; }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--salmon-light);
    border: 2px solid var(--ink);
    transition: background 0.3s;
  }
  .dot.on { background: var(--salmon); }

  /* 히스토리 */
  .history-label {
    font-size: 13px;
    color: var(--soft);
    text-align: center;
    display: none;
  }
  .history-label.show { display: block; }

  .history-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .history-card {
    background: var(--cream);
    border: 2.5px solid var(--ink);
    border-radius: 20px;
    padding: 13px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    box-shadow: 3px 3px 0 var(--ink);
    animation: card-in 0.25s ease;
    cursor: default;
    transition: transform 0.15s;
  }

  .history-card:hover { transform: none; }

  .h-card-top {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: opacity 0.15s;
  }

  .h-card-top:hover { opacity: 0.75; }

  .h-tap-hint {
    font-size: 11px;
    color: var(--soft);
    text-align: right;
    margin-top: 4px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .history-card.has-memo .h-tap-hint,
  .history-card.open .h-tap-hint { opacity: 0; height: 0; margin: 0; overflow: hidden; }

  /* 메모 펼침 영역 */
  .h-memo-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .h-memo-wrap.open {
    max-height: 200px;
    opacity: 1;
  }

  .h-memo-inner {
    padding-top: 12px;
    border-top: 1.5px dashed #e0d4ce;
    margin-top: 10px;
  }

  .h-memo-textarea {
    width: 100%;
    background: transparent;
    border: none;
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
    resize: none;
    outline: none;
    min-height: 60px;
  }

  .h-memo-textarea::placeholder {
    color: #c8b8b0;
    font-family: 'Gowun Batang', serif;
  }

  .h-memo-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
  }

  .h-memo-saved {
    font-size: 12px;
    color: var(--sage);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .h-memo-saved.show { opacity: 1; }

  .h-save-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 30px;
    padding: 6px 16px;
    font-family: 'Gaegu', cursive;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--sage);
    transition: all 0.12s;
  }

  .h-save-btn:hover {
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--sage);
  }

  /* 메모 있는 카드 표시 */
  .history-card.has-memo .h-q {
    color: var(--sage-dark, #4a7050);
  }

  .h-memo-preview {
    font-family: 'Gowun Batang', serif;
    font-size: 12px;
    color: var(--soft);
    margin-top: 4px;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ───── 묻어두기 버튼 ───── */
  .h-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1.5px dashed #e0d4ce;
  }

  .bury-btn {
    background: none;
    border: 1.5px solid #c8b8b0;
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Gaegu', cursive;
    font-size: 12px;
    color: #a89490;
    cursor: pointer;
    transition: all 0.15s;
  }

  .bury-btn:hover {
    border-color: #6b6b6b;
    color: #4a4a4a;
  }

  .history-card.burying {
    animation: bury-anim 0.6s ease forwards;
    pointer-events: none;
  }

  @keyframes bury-anim {
    0%   { transform: translateY(0); opacity: 1; }
    40%  { transform: translateY(6px) rotate(1deg); opacity: 0.6; }
    100% { transform: translateY(20px); opacity: 0; }
  }

  /* ───── 묘지 섹션 ───── */
  .graveyard-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: 8px;
  }

  .gy-icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.2s ease;
    padding: 8px;
  }

  .gy-icon-wrap:hover { transform: translateY(-3px); }

  .gy-icon { font-size: 30px; }

  .gy-badge {
    background: #6b6b6b;
    color: #fffaf8;
    border-radius: 20px;
    padding: 1px 9px;
    font-size: 11px;
    font-family: 'Gaegu', cursive;
    min-width: 20px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .gy-badge.show { opacity: 1; }

  /* 묘지 펼침 */
  .gy-body {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s ease, opacity 0.35s ease;
    opacity: 0;
  }

  .gy-body.open {
    max-height: 1000px;
    opacity: 1;
  }

  /* ───── 폴라로이드 그리드 ───── */
  .polaroid-grid {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 16px 4px 8px;
    align-items: center;
  }

  .polaroid-card {
    background: #faf6ee;
    border: 1px solid #d8cfc0;
    padding: 14px 14px 32px;
    width: 100%;
    max-width: 280px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.03);
    cursor: pointer;
    transition: transform 0.3s ease, filter 0.3s ease, box-shadow 0.3s ease;
    filter: sepia(0.4) brightness(0.92);
    position: relative;
    animation: polaroid-in 0.4s ease;
  }

  @keyframes polaroid-in {
    from { opacity: 0; transform: rotate(0deg) scale(0.85); }
    to { opacity: 1; }
  }

  .polaroid-card:nth-child(odd)  { transform: rotate(-2deg); }
  .polaroid-card:nth-child(even) { transform: rotate(1.5deg); }

  .polaroid-card:hover {
    filter: sepia(0) brightness(1);
    box-shadow: 4px 8px 24px rgba(0,0,0,0.15);
  }

  .polaroid-card:nth-child(odd):hover  { transform: rotate(0deg) scale(1.02); }
  .polaroid-card:nth-child(even):hover { transform: rotate(0deg) scale(1.02); }

  /* 테이프 */
  .polaroid-card::before {
    content: '';
    position: absolute;
    top: -9px; left: 50%;
    transform: translateX(-50%) rotate(-1deg);
    width: 50px; height: 16px;
    background: rgba(255,240,160,0.75);
    border: 1px solid rgba(200,180,80,0.25);
  }

  .polaroid-img {
    width: 100%;
    height: 90px;
    background: #e8e0d0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    filter: grayscale(0.3);
    transition: filter 0.3s;
  }

  .polaroid-card:hover .polaroid-img { filter: grayscale(0); }

  .polaroid-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 60%);
    pointer-events: none;
  }

  .polaroid-q {
    font-family: 'Nanum Pen Script', cursive;
    font-size: 16px;
    color: #5a4a3a;
    line-height: 1.55;
    text-align: center;
  }

  .polaroid-mood {
    font-size: 11px;
    color: #a89490;
    text-align: center;
    margin-top: 5px;
    letter-spacing: 1px;
  }

  .polaroid-revive {
    position: absolute;
    bottom: 8px; right: 12px;
    font-size: 11px;
    color: #7a9e7e;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .polaroid-card:hover .polaroid-revive { opacity: 1; }

  .polaroid-card.reviving {
    animation: revive-anim 0.45s ease forwards;
    pointer-events: none;
  }

  @keyframes revive-anim {
    0%  { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); filter: sepia(0) brightness(1.1); }
    100%{ opacity: 0; transform: scale(0.9); }
  }

  /* 토스트 */
  .revive-toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--cream);
    border-radius: 30px;
    padding: 10px 22px;
    font-size: 14px;
    font-family: 'Gaegu', cursive;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .revive-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .history-card:nth-child(4n+2) { background: var(--sage-pale); }
  .history-card:nth-child(4n+3) { background: var(--yellow); }
  .history-card:nth-child(4n+4) { background: var(--lavender); }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .h-emoji { font-size: 20px; flex-shrink: 0; }

  .h-info { flex: 1; min-width: 0; }

  .h-mood {
    font-size: 11px;
    color: var(--soft);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .h-q {
    font-family: 'Gowun Batang', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.45;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .h-num {
    font-size: 13px;
    color: var(--salmon);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* API 키 섹션 */
  .api-key-section {
    width: 100%;
    background: var(--cream);
    border: 2px dashed #d4c8c0;
    border-radius: 20px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .api-key-section.saved {
    border-style: solid;
    border-color: var(--sage-light);
    background: var(--sage-pale);
  }

  .api-key-label {
    font-size: 12px;
    color: var(--soft);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-key-label .key-status {
    margin-left: auto;
    font-size: 11px;
    color: var(--sage);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .api-key-label .key-status.show { opacity: 1; }

  .api-key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-key-input {
    flex: 1;
    background: var(--salmon-pale);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 9px 14px;
    font-family: 'Gaegu', cursive;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .api-key-input:focus { border-color: var(--sage); }
  .api-key-input::placeholder { color: #c8b8b0; }

  .api-key-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    padding: 9px 16px;
    font-family: 'Gaegu', cursive;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 2px 2px 0 var(--sage);
    transition: all 0.12s;
    flex-shrink: 0;
  }

  .api-key-btn:hover {
    transform: translate(-1px,-1px);
    box-shadow: 3px 3px 0 var(--sage);
  }

  .api-key-toggle {
    background: none;
    border: none;
    font-size: 13px;
    color: var(--soft);
    cursor: pointer;
    font-family: 'Gaegu', cursive;
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 0;
  }

  .api-key-toggle:hover { color: var(--ink); }
</style>
</head>
<body>

<div class="bg-blob-1"></div>
<div class="bg-blob-2"></div>

<!-- 배경 잎사귀 SVG -->
<svg class="fixed-leaf fixed-leaf-tr" width="100" height="170" viewBox="0 0 100 170" fill="none">
  <path d="M50 160 Q8 100 25 25 Q50 0 75 25 Q92 100 50 160Z" fill="#7a9e7e"/>
  <line x1="50" y1="160" x2="50" y2="25" stroke="#4a7050" stroke-width="1.5"/>
  <path d="M50 80 Q30 65 25 45" stroke="#4a7050" stroke-width="1" fill="none"/>
  <path d="M50 100 Q70 85 75 65" stroke="#4a7050" stroke-width="1" fill="none"/>
</svg>
<svg class="fixed-leaf fixed-leaf-bl" width="80" height="140" viewBox="0 0 80 140" fill="none">
  <path d="M40 130 Q5 80 18 20 Q40 0 62 20 Q75 80 40 130Z" fill="#f2a99a"/>
  <line x1="40" y1="130" x2="40" y2="20" stroke="#c07060" stroke-width="1.2"/>
</svg>

<div class="app">

  <!-- API 키 입력 -->
  <div class="api-key-section" id="api-key-section">
    <div class="api-key-label">
      🔑 Anthropic API Key
      <span class="key-status" id="key-status">✓ 저장됨</span>
    </div>
    <div class="api-key-row" id="key-input-row">
      <input class="api-key-input" id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off">
      <button class="api-key-btn" onclick="saveApiKey()">저장</button>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <span class="header-emoji">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 60 Q8 40 14 10 Q32 0 50 10 Q56 40 32 60Z" fill="#7a9e7e" opacity="0.85"/>
        <line x1="32" y1="60" x2="32" y2="10" stroke="#4a7050" stroke-width="1.8"/>
        <path d="M32 38 Q18 28 14 16" stroke="#4a7050" stroke-width="1.2" fill="none"/>
        <path d="M32 46 Q46 36 50 22" stroke="#4a7050" stroke-width="1.2" fill="none"/>
        <path d="M18 58 Q26 44 32 60 Q38 44 46 58" fill="#f2a99a" opacity="0.6"/>
      </svg>
    </span>
    <div class="header-title">철학적 질문 자판기</div>
    <div class="header-sub">심오하지만 귀여운 🌿</div>
  </div>

  <!-- 메인 카드 -->
  <div class="main-card">
    <span class="sticker sticker-a">🌸</span>
    <span class="sticker sticker-b">⭐</span>
    <span class="sticker sticker-c">🍃</span>

    <div class="card-top">
      <span class="session-tag">SESSION <span id="sess-num">—</span></span>
      <span class="mood-pill" id="mood-pill">···</span>
    </div>

    <div class="question-zone">
      <div class="placeholder" id="placeholder">
        <span class="placeholder-icon">🌺</span>
        <span class="placeholder-text">버튼을 눌러<br>질문을 받아보세요</span>
      </div>
      <div class="question-output" id="q-output">
        <div class="question-q" id="q-text"></div>
        <div class="waveform" id="waveform">
          <div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div><div class="wb"></div><div class="wb"></div>
          <div class="wb"></div><div class="wb"></div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <div class="count-bubble" id="count-bubble">0</div>
      <button class="main-btn" id="main-btn" onclick="dispense()">
        <span class="btn-icon" id="btn-icon">🪴</span>
        질문 뽑기!
      </button>
    </div>
  </div>

  <!-- 도트 카운터 -->
  <div class="dot-row" id="dot-row">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>

  <!-- 히스토리 -->
  <div class="history-label" id="hist-label">— 지난 질문들 —</div>
  <div class="history-list" id="hist-list"></div>

  <!-- 묘지 섹션 -->
  <div class="graveyard-section" id="gy-section" style="display:none">
    <div class="gy-icon-wrap" onclick="toggleGraveyard()">
      <span class="gy-icon">🪦</span>
      <span class="gy-badge" id="gy-badge"></span>
    </div>
    <div class="gy-body" id="gy-body">
      <div class="polaroid-grid" id="polaroid-grid"></div>
    </div>
  </div>

</div>

<div class="revive-toast" id="revive-toast">🌱 질문이 다시 돌아왔어요</div>

<script>
  let count = 0;
  let history = [];
  let busy = false;

  // API 키 관리
  function loadApiKey() {
    const key = localStorage.getItem('anthro-api-key') || '';
    const input = document.getElementById('api-key-input');
    const section = document.getElementById('api-key-section');
    const status = document.getElementById('key-status');
    const inputRow = document.getElementById('key-input-row');

    if (key) {
      input.value = key;
      section.classList.add('saved');
      status.classList.add('show');
      inputRow.style.display = 'none';
    }
  }

  function saveApiKey() {
    const input = document.getElementById('api-key-input');
    const section = document.getElementById('api-key-section');
    const status = document.getElementById('key-status');
    const inputRow = document.getElementById('key-input-row');
    const key = input.value.trim();

    if (!key) return;
    localStorage.setItem('anthro-api-key', key);
    section.classList.add('saved');
    status.classList.add('show');
    inputRow.style.display = 'none';
  }

  // 키 섹션 클릭 시 입력창 다시 열기
  document.addEventListener('DOMContentLoaded', () => {
    loadApiKey();
    document.getElementById('key-status').addEventListener('click', () => {
      const inputRow = document.getElementById('key-input-row');
      inputRow.style.display = inputRow.style.display === 'none' ? 'flex' : 'none';
    });
  });

  const MOOD_MAP = {
    '무거운':   { emoji: '🌑', bg: '#ede0f8' },
    '가벼운':   { emoji: '🌤', bg: '#edf5ee' },
    '시적인':   { emoji: '🌸', bg: '#fef0ec' },
    '날카로운': { emoji: '⚡', bg: '#fff8e0' },
    '따뜻한':   { emoji: '🔥', bg: '#fcd5cc' },
    '쓸쓸한':   { emoji: '🌧', bg: '#dde8f5' },
    '황당한':   { emoji: '🤔', bg: '#fff3b0' },
    '조용한':   { emoji: '🍃', bg: '#c2d9c5' },
  };

  const SYS = `철학적 질문 자판기입니다. 아래 JSON만 출력하세요.
{"question":"질문","mood":"무드"}
mood는 반드시: 무거운|가벼운|시적인|날카로운|따뜻한|쓸쓸한|황당한|조용한 중 하나.
질문: 한국어, 15~40자, 물음표 끝, 답 없는 철학적 질문, 매번 다른 주제.
JSON 외 텍스트 절대 금지.`;

  async function dispense() {
    if (busy) return;
    busy = true;

    const btn = document.getElementById('main-btn');
    const icon = document.getElementById('btn-icon');
    const ph = document.getElementById('placeholder');
    const qOut = document.getElementById('q-output');
    const wave = document.getElementById('waveform');
    const pill = document.getElementById('mood-pill');

    btn.disabled = true;
    btn.classList.add('loading');
    icon.textContent = '🌀';
    qOut.classList.remove('show');
    wave.classList.remove('show');
    pill.classList.remove('show');
    ph.style.display = 'flex';
    ph.querySelector('.placeholder-icon').textContent = '🌀';
    ph.querySelector('.placeholder-text').innerHTML = '생각 중...';

    const prev = history.length
      ? '\n중복 금지 기존 질문:\n' + history.map((h,i)=>`${i+1}. ${h.q}`).join('\n')
      : '';

    let question = '', mood = '조용한';
    try {
      const apiKey = localStorage.getItem('anthro-api-key') || '';
      if (!apiKey) throw new Error('no key');

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 200,
          system: SYS + prev,
          messages: [{ role: "user", content: "생성" }]
        })
      });
      const data = await res.json();
      let raw = (data.content?.[0]?.text || '').replace(/```json|```/g,'').trim();
      const p = JSON.parse(raw);
      question = p.question; mood = p.mood || '조용한';
    } catch {
      const fb = [
        ["내가 기억하지 못하는 나는 아직 나인가?","무거운"],
        ["지금 이 순간만이 진짜인가?","조용한"],
        ["사랑받는다는 것은 증명 가능한 일인가?","따뜻한"],
        ["완전히 혼자인 사람은 자유로운가?","쓸쓸한"],
        ["아름답다고 느끼는 순간 세상은 바뀌는가?","시적인"],
      ];
      const pick = fb[Math.floor(Math.random()*fb.length)];
      question = pick[0]; mood = pick[1];
    }

    // 표시
    count++;
    ph.style.display = 'none';
    document.getElementById('q-text').textContent = question;
    qOut.classList.remove('show');
    void qOut.offsetWidth;
    qOut.classList.add('show');
    wave.classList.add('show');

    const m = MOOD_MAP[mood] || MOOD_MAP['조용한'];
    pill.textContent = m.emoji + ' ' + mood;
    pill.style.background = m.bg;
    pill.classList.add('show');

    document.getElementById('sess-num').textContent = String(count).padStart(2,'0');

    const cb = document.getElementById('count-bubble');
    cb.textContent = count;
    cb.classList.remove('bump');
    void cb.offsetWidth;
    cb.classList.add('bump');

    // 도트
    const dotRow = document.getElementById('dot-row');
    dotRow.classList.add('show');
    document.querySelectorAll('.dot').forEach((d,i) =>
      d.classList.toggle('on', i < (count % 5 || 5))
    );

    // 히스토리
    history.unshift({ q: question, mood, emoji: m.emoji, num: count });
    if (history.length > 8) history.pop();
    renderHistory();

    busy = false;
    btn.disabled = false;
    btn.classList.remove('loading');
    icon.textContent = '🪴';
  }

  let buried = [];
  let gyOpen = false;

  function buryCard(e, idx) {
    e.stopPropagation();
    const item = history[idx];
    if (!item) return;

    // 카드 애니메이션
    const card = document.getElementById(`hcard-${idx}`);
    if (card) {
      card.classList.add('burying');
      setTimeout(() => {
        history.splice(idx, 1);
        buried.push({ ...item, buriedId: Date.now() });
        renderHistory();
        updateGraveyard();
      }, 600);
    }
  }

  function toggleGraveyard() {
    gyOpen = !gyOpen;
    document.getElementById('gy-body').classList.toggle('open', gyOpen);
  }

  function updateGraveyard() {
    const section = document.getElementById('gy-section');
    const badge = document.getElementById('gy-badge');

    if (buried.length === 0) {
      section.style.display = 'none';
      gyOpen = false;
      document.getElementById('gy-body').classList.remove('open');
      return;
    }

    section.style.display = 'flex';
    badge.textContent = buried.length;
    badge.classList.add('show');

    const grid = document.getElementById('polaroid-grid');
    grid.innerHTML = buried.map(b => `
      <div class="polaroid-card" id="pol-${b.buriedId}" onclick="revivePolaroid(${b.buriedId})">
        <div class="polaroid-img">${b.emoji}</div>
        <div class="polaroid-q">${b.q}</div>
        <div class="polaroid-mood">${b.mood}</div>
        <span class="polaroid-revive">🌱 꺼내기</span>
      </div>
    `).join('');
  }

  function revivePolaroid(buriedId) {
    const pol = document.getElementById(`pol-${buriedId}`);
    if (!pol) return;
    pol.classList.add('reviving');

    setTimeout(() => {
      const idx = buried.findIndex(b => b.buriedId === buriedId);
      if (idx !== -1) {
        const item = buried.splice(idx, 1)[0];
        history.push(item);
      }
      updateGraveyard();
      renderHistory();
      showToast();
    }, 450);
  }

  function showToast() {
    const toast = document.getElementById('revive-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function renderHistory() {
    const label = document.getElementById('hist-label');
    const list = document.getElementById('hist-list');
    const prev = history.slice(1);

    if (!prev.length) { label.classList.remove('show'); list.innerHTML = ''; return; }

    label.classList.add('show');
    list.innerHTML = prev.map((h, i) => {
      const idx = i + 1;
      const hasMemo = h.memo && h.memo.trim();
      return `
        <div class="history-card ${hasMemo ? 'has-memo' : ''}" id="hcard-${idx}">
          <div class="h-card-top" onclick="toggleMemo(${idx})" style="cursor:pointer">
            <span class="h-emoji">${h.emoji}</span>
            <div class="h-info">
              <div class="h-mood">${h.mood}</div>
              <div class="h-q">${h.q}</div>
              ${hasMemo ? `<div class="h-memo-preview">💬 ${h.memo}</div>` : ''}
            </div>
            <span class="h-num">${String(h.num).padStart(2,'0')}</span>
          </div>
          ${!hasMemo ? `<div class="h-tap-hint" onclick="toggleMemo(${idx})" style="cursor:pointer">탭해서 생각 적기 ✏️</div>` : ''}
          <div class="h-memo-wrap" id="hmemo-${idx}" onclick="event.stopPropagation()">
            <div class="h-memo-inner">
              <textarea class="h-memo-textarea" id="hta-${idx}" placeholder="지금 떠오르는 생각을 적어보세요...">${h.memo || ''}</textarea>
              <div class="h-memo-footer">
                <span class="h-memo-saved" id="hsaved-${idx}">저장됐어요 🌿</span>
                <button class="h-save-btn" onclick="saveMemo(event, ${idx})">저장</button>
              </div>
            </div>
          </div>
          <div class="h-actions">
            <button class="bury-btn" onclick="buryCard(event, ${idx})">🪦 묻어두기</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleMemo(idx) {
    const wrap = document.getElementById(`hmemo-${idx}`);
    const card = document.getElementById(`hcard-${idx}`);
    const isOpen = wrap.classList.contains('open');

    if (isOpen) {
      wrap.classList.remove('open');
      card.classList.remove('open');
    } else {
      wrap.classList.add('open');
      card.classList.add('open');
      setTimeout(() => document.getElementById(`hta-${idx}`)?.focus(), 350);
    }
  }

  function saveMemo(e, idx) {
    e.stopPropagation();
    const ta = document.getElementById(`hta-${idx}`);
    const saved = document.getElementById(`hsaved-${idx}`);
    const text = ta.value.trim();

    history[idx].memo = text;

    saved.classList.add('show');
    setTimeout(() => {
      saved.classList.remove('show');
      // 저장 후 입력창 닫기
      const wrap = document.getElementById(`hmemo-${idx}`);
      const card = document.getElementById(`hcard-${idx}`);
      wrap.classList.remove('open');
      card.classList.remove('open');
      // 메모 프리뷰 업데이트
      renderHistory();
    }, 1200);
  }
</script>
</body>
</html>
