<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>철학적 질문 자판기</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --salmon: #f2a99a;
    --salmon-light: #f7c9be;
    --bg: #fdf0ec;
    --sage: #7a9e7e;
    --sage-light: #b2cbb5;
    --sage-dark: #4a7050;
    --cream: #fffaf8;
    --ink: #2c2c2c;
    --soft: #9a8a85;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* 배경 원형 장식 */
  .bg-circle-1 {
    position: fixed;
    width: 320px;
    height: 320px;
    background: var(--salmon-light);
    border-radius: 50%;
    top: -80px;
    right: -80px;
    opacity: 0.45;
    pointer-events: none;
  }

  .bg-circle-2 {
    position: fixed;
    width: 200px;
    height: 200px;
    background: var(--sage-light);
    border-radius: 50%;
    bottom: -40px;
    left: -60px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* 보태니컬 SVG 잎사귀들 */
  .leaf {
    position: fixed;
    pointer-events: none;
    opacity: 0.18;
  }

  .leaf-1 { bottom: 60px; right: 20px; transform: rotate(20deg); }
  .leaf-2 { top: 120px; left: -10px; transform: rotate(-30deg) scaleX(-1); }

  /* 앱 컨테이너 */
  .app {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* 상단 헤더 */
  .app-header {
    text-align: center;
    padding-bottom: 28px;
  }

  .session-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 10px;
  }

  .app-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .app-sub {
    font-size: 13px;
    color: var(--soft);
    font-style: italic;
  }

  /* 일러스트 영역 */
  .illustration {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }

  .illust-circle {
    width: 130px;
    height: 130px;
    background: var(--salmon-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: visible;
  }

  .illust-figure {
    font-size: 62px;
    line-height: 1;
    animation: breathe 4s ease-in-out infinite;
    user-select: none;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.06) translateY(-4px); }
  }

  /* 잎사귀 장식 (인라인) */
  .leaf-deco {
    position: absolute;
    font-size: 28px;
    opacity: 0.7;
    pointer-events: none;
  }

  .leaf-deco-1 { left: -18px; bottom: 10px; transform: rotate(-40deg); }
  .leaf-deco-2 { right: -14px; top: 14px; transform: rotate(30deg) scaleX(-1); }
  .leaf-deco-3 { right: -24px; bottom: 20px; transform: rotate(60deg) scaleX(-1); font-size: 20px; }

  /* 메인 카드 */
  .card {
    background: var(--cream);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow:
      0 2px 0 var(--salmon-light),
      0 8px 32px rgba(44,44,44,0.06),
      0 2px 8px rgba(44,44,44,0.04);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  /* 카드 상단 — 세션 표시 */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .session-badge {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--soft);
  }

  .mood-chip {
    background: var(--salmon-light);
    color: var(--sage-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .mood-chip.show { opacity: 1; }

  /* 질문 영역 */
  .question-zone {
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 0 16px;
  }

  .placeholder {
    text-align: center;
    color: var(--soft);
    font-size: 14px;
    line-height: 1.8;
  }

  .placeholder-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 8px;
    animation: sway 3s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .question-display {
    display: none;
    text-align: center;
  }

  .question-display.show {
    display: block;
    animation: fade-up 0.5s ease forwards;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  /* 파형 장식 (명상 앱 오디오 느낌) */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 24px;
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.6s ease 0.3s;
  }

  .waveform.show { opacity: 1; }

  .wave-bar {
    width: 3px;
    background: var(--salmon);
    border-radius: 2px;
    animation: wave-anim 1.4s ease-in-out infinite;
  }

  .wave-bar:nth-child(1)  { height: 8px;  animation-delay: 0s; }
  .wave-bar:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3)  { height: 20px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4)  { height: 12px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5)  { height: 18px; animation-delay: 0.15s; }
  .wave-bar:nth-child(6)  { height: 22px; animation-delay: 0.05s; }
  .wave-bar:nth-child(7)  { height: 16px; animation-delay: 0.25s; }
  .wave-bar:nth-child(8)  { height: 10px; animation-delay: 0.35s; }
  .wave-bar:nth-child(9)  { height: 20px; animation-delay: 0.1s; }
  .wave-bar:nth-child(10) { height: 14px; animation-delay: 0.2s; }
  .wave-bar:nth-child(11) { height: 8px;  animation-delay: 0.3s; }
  .wave-bar:nth-child(12) { height: 18px; animation-delay: 0.05s; }
  .wave-bar:nth-child(13) { height: 12px; animation-delay: 0.15s; }

  @keyframes wave-anim {
    0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* 메인 버튼 */
  .btn-main {
    width: 100%;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 50px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-main:hover {
    background: var(--sage-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74,112,80,0.25);
  }

  .btn-main:active {
    transform: translateY(1px);
    box-shadow: none;
  }

  .btn-main:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }

  .btn-icon {
    font-size: 18px;
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .btn-main.loading .btn-icon {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 카운터 바 */
  .counter-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    margin-bottom: 16px;
    display: none;
  }

  .counter-bar.show { display: flex; }

  .counter-text {
    font-size: 12px;
    color: var(--soft);
  }

  .counter-dots {
    display: flex;
    gap: 5px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--salmon-light);
    transition: background 0.3s ease;
  }

  .dot.active { background: var(--salmon); }

  /* 히스토리 세션 목록 */
  .sessions-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--soft);
    margin-bottom: 12px;
    display: none;
    padding: 0 4px;
  }

  .sessions-label.show { display: block; }

  .session-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .session-item {
    background: var(--cream);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(44,44,44,0.05);
    animation: slide-in 0.3s ease;
    cursor: default;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .session-item:hover {
    transform: translateX(3px);
    box-shadow: 0 4px 14px rgba(44,44,44,0.08);
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .session-play {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--salmon-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }

  .session-info {
    flex: 1;
    min-width: 0;
  }

  .session-name {
    font-size: 12px;
    color: var(--soft);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .session-q {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-num {
    font-size: 12px;
    color: var(--salmon);
    font-weight: 500;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- 배경 장식 -->
<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>

<!-- 고정 잎사귀 -->
<svg class="leaf leaf-1" width="120" height="200" viewBox="0 0 120 200" fill="none">
  <path d="M60 190 Q10 120 30 40 Q60 0 90 40 Q110 120 60 190Z" fill="#7a9e7e"/>
  <line x1="60" y1="190" x2="60" y2="40" stroke="#4a7050" stroke-width="1.5"/>
</svg>
<svg class="leaf leaf-2" width="90" height="160" viewBox="0 0 90 160" fill="none">
  <path d="M45 150 Q5 90 20 20 Q45 0 70 20 Q85 90 45 150Z" fill="#f2a99a"/>
  <line x1="45" y1="150" x2="45" y2="20" stroke="#c07060" stroke-width="1.2"/>
</svg>

<div class="app">

  <!-- 헤더 -->
  <div class="app-header">
    <div class="session-label">Your Daily Session</div>
    <div class="app-title">철학적 질문<br>자판기</div>
    <div class="app-sub">생각이 깊어지는 순간</div>
  </div>

  <!-- 일러스트 -->
  <div class="illustration">
    <div class="illust-circle">
      <span class="illust-figure">🧘</span>
      <span class="leaf-deco leaf-deco-1">🌿</span>
      <span class="leaf-deco leaf-deco-2">🍃</span>
      <span class="leaf-deco leaf-deco-3">🌱</span>
    </div>
  </div>

  <!-- 메인 카드 -->
  <div class="card">
    <div class="card-top">
      <span class="session-badge">SESSION <span id="session-num">—</span></span>
      <span class="mood-chip" id="mood-chip">···</span>
    </div>

    <div class="question-zone">
      <div class="placeholder" id="placeholder">
        <span class="placeholder-icon">🌸</span>
        잠시 멈추고<br>질문을 받아보세요
      </div>
      <div class="question-display" id="q-display">
        <div class="question-text" id="q-text"></div>
      </div>
    </div>

    <div class="waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <button class="btn-main" id="main-btn" onclick="dispense()">
      <span class="btn-icon" id="btn-icon">▶</span>
      NEXT SESSION
    </button>
  </div>

  <!-- 카운터 -->
  <div class="counter-bar" id="counter-bar">
    <span class="counter-text">오늘의 세션</span>
    <div class="counter-dots" id="counter-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="sessions-label" id="sessions-label">이전 세션들</div>
  <div class="session-list" id="session-list"></div>

</div>

<script>
  let count = 0;
  let history = [];
  let isLoading = false;

  const MOODS = {
    '무거운':  { label: '무거운', color: '#ddd0f0' },
    '가벼운':  { label: '가벼운', color: '#b2cbb5' },
    '시적인':  { label: '시적인', color: '#f7c9be' },
    '날카로운':{ label: '날카로운', color: '#ffe0b0' },
    '따뜻한':  { label: '따뜻한', color: '#ffd6c8' },
    '쓸쓸한':  { label: '쓸쓸한', color: '#c8d8f0' },
    '황당한':  { label: '황당한', color: '#fff3b0' },
    '조용한':  { label: '조용한', color: '#d8ead8' },
  };

  const MOOD_EMOJIS = {
    '무거운': '🌑', '가벼운': '🌤', '시적인': '🌸',
    '날카로운': '⚡', '따뜻한': '🔥', '쓸쓸한': '🌧',
    '황당한': '🤔', '조용한': '🍃'
  };

  const SYSTEM_PROMPT = `당신은 철학적 질문을 생성하는 명상 앱입니다.
아래 JSON 형식으로만 응답하세요.

{"question": "질문 내용", "mood": "무드"}

mood는 다음 중 하나: 무거운, 가벼운, 시적인, 날카로운, 따뜻한, 쓸쓸한, 황당한, 조용한

질문 기준:
- 답이 없거나 답이 여러 개인 것
- 15~40자 사이, 물음표로 끝남
- 잠시 멈추게 만드는 질문
- 무드는 랜덤하게 다양하게 선택
- 매번 다른 주제: 시간, 기억, 존재, 언어, 타인, 죽음, 사랑, 의식, 자유의지, 진실, 아름다움, 도덕, 정체성 등

JSON만 출력하고 절대 다른 텍스트 포함하지 마세요.`;

  async function dispense() {
    if (isLoading) return;
    isLoading = true;

    const btn = document.getElementById('main-btn');
    const icon = document.getElementById('btn-icon');
    const placeholder = document.getElementById('placeholder');
    const qDisplay = document.getElementById('q-display');
    const waveform = document.getElementById('waveform');
    const moodChip = document.getElementById('mood-chip');

    btn.disabled = true;
    btn.classList.add('loading');
    icon.textContent = '↻';

    qDisplay.classList.remove('show');
    waveform.classList.remove('show');
    moodChip.classList.remove('show');
    placeholder.style.display = 'flex';
    placeholder.style.flexDirection = 'column';
    placeholder.style.alignItems = 'center';
    placeholder.querySelector('.placeholder-icon').textContent = '🌀';
    placeholder.querySelector('br').nextSibling.textContent = '';
    placeholder.childNodes[2].textContent = '호흡을 가다듬는 중...';

    const prevList = history.length > 0
      ? `\n이미 나온 질문들 (중복 금지):\n${history.map((h, i) => `${i+1}. ${h.q}`).join('\n')}`
      : '';

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: SYSTEM_PROMPT + prevList,
          messages: [{ role: "user", content: "질문 생성" }]
        })
      });

      const data = await res.json();
      let raw = data.content?.[0]?.text?.trim() || '';
      raw = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(raw);
      showQuestion(parsed.question, parsed.mood);

    } catch(e) {
      const fallbacks = [
        { question: "내가 기억하지 못하는 나는 아직 나인가?", mood: "무거운" },
        { question: "지금 이 순간만이 진짜인가?", mood: "조용한" },
        { question: "사랑받는다는 것은 증명 가능한 일인가?", mood: "따뜻한" },
        { question: "완전히 혼자인 사람은 자유로운가?", mood: "쓸쓸한" },
        { question: "아름답다고 느끼는 순간 세상은 바뀌는가?", mood: "시적인" },
      ];
      const f = fallbacks[Math.floor(Math.random() * fallbacks.length)];
      showQuestion(f.question, f.mood);
    }

    isLoading = false;
    btn.disabled = false;
    btn.classList.remove('loading');
    icon.textContent = '▶';
  }

  function showQuestion(question, mood) {
    count++;

    const placeholder = document.getElementById('placeholder');
    const qDisplay = document.getElementById('q-display');
    const qText = document.getElementById('q-text');
    const waveform = document.getElementById('waveform');
    const moodChip = document.getElementById('mood-chip');
    const sessionNum = document.getElementById('session-num');
    const counterBar = document.getElementById('counter-bar');

    placeholder.style.display = 'none';

    qText.textContent = question;
    qDisplay.classList.remove('show');
    void qDisplay.offsetWidth;
    qDisplay.classList.add('show');

    waveform.classList.add('show');

    const moodData = MOODS[mood] || MOODS['조용한'];
    const moodEmoji = MOOD_EMOJIS[mood] || '💭';
    moodChip.textContent = moodEmoji + ' ' + moodData.label;
    moodChip.style.background = moodData.color;
    moodChip.classList.add('show');

    sessionNum.textContent = String(count).padStart(2, '0');

    // 카운터 도트
    counterBar.classList.add('show');
    const dots = document.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('active', i < (count % 5 || 5)));

    // 히스토리
    history.unshift({ q: question, mood: mood, emoji: moodEmoji, num: count });
    if (history.length > 8) history.pop();
    renderSessions();
  }

  function renderSessions() {
    const label = document.getElementById('sessions-label');
    const list = document.getElementById('session-list');

    if (history.length <= 1) {
      label.classList.remove('show');
      list.innerHTML = '';
      return;
    }

    label.classList.add('show');
    list.innerHTML = history.slice(1).map(item => `
      <div class="session-item">
        <div class="session-play">${item.emoji}</div>
        <div class="session-info">
          <div class="session-name">${item.mood}</div>
          <div class="session-q">${item.q}</div>
        </div>
        <div class="session-num">${String(item.num).padStart(2,'0')}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
